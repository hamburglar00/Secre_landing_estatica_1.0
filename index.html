  <script>
    const whatsappNumbers = [
      "5493562517045", //Agus
      "5491169822612", //Lourdes
      "5491164728319"  //Sofi
    ];
    function goToWhatsApp(){
      const whatsappNumber = whatsappNumbers[Math.floor(Math.random() * whatsappNumbers.length)];
      fbq('track','Contact');
      window.location.href=`https://wa.me/${whatsappNumber}?text=Hola!%20quiero%20m%C3%A1s%20informacion%20por%20favor!%20mi%20nombre%20es:`;
    }

    const testimonios=[
      'Romina.S: "GANEE!! me dieron un gran bono 50%💰. Recomendado!” ⭐⭐⭐⭐⭐',
      'Juan pablo.T: "Muy profesional, confiable. Siempre jugando con ellos 👑” ⭐⭐⭐⭐⭐',
      'Susana.D: "Saque $240.000 me hacian mucha falta 🙌. Increíble.” ⭐⭐⭐⭐⭐',
      'Diego.A: "Gané $500.000 recien jugando al joker cash 😱🔥" ⭐⭐⭐⭐⭐',
      'Camila.R: "Recargué $2.000 y me dieron el DOBLE de bono💰💰" ⭐⭐⭐⭐',
      'Luis.F: "Pensé que era falso, pero ya cobré dos veces. Gracias 🙌" ⭐⭐⭐⭐',
      'Emilia.B: "Jugué por primera vez, me ayudaron en todo y gane un premiaso👌" ⭐⭐⭐⭐⭐'
    ];
    let current=0;
    function updateTestimonio(){
      const tDiv=document.getElementById('testimonial-text');
      const pBar=document.getElementById('progress-bar');
      tDiv.innerText=testimonios[current];
      pBar.style.transition='none';
      pBar.style.width='0%';
      setTimeout(()=>{
        pBar.style.transition='width 5s linear';
        pBar.style.width='100%';
      },10);
      current=(current+1)%testimonios.length;
    }
    window.onload=()=>{
      updateTestimonio();
      setInterval(updateTestimonio,5000);
    };
  </script>
